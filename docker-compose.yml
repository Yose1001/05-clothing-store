services:
  mongo:
    image: mongo:7
    container_name: clothing-store-db
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # ไม่ expose port ออกนอก network เพื่อความปลอดภัย

  backend:
    build: ./backend
    container_name: clothing-store-api
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/clothing-store
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - mongo
    ports:
      # ใช้ 5002 เพื่อไม่ชนกับโปรเจค 04 (5001) และ AirPlay ของ macOS (5000)
      - "5002:5000"

  frontend:
    build: ./frontend
    container_name: clothing-store-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # ใช้ 3001 เพื่อไม่ชนกับโปรเจค 04 (3000)
      - "3001:80"

volumes:
  mongo-data:
