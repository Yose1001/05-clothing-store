server {
    listen 80;

    # เสิร์ฟไฟล์ React ที่ build แล้ว
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA: ทุก path ที่ไม่ใช่ไฟล์จริง ให้ส่ง index.html (กัน 404 ตอน refresh)
        try_files $uri $uri/ /index.html;
    }

    # ส่งต่อ request ที่ขึ้นต้นด้วย /api ไปยัง backend container
    location /api {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
